# ImageSetConfig to test mirroring a single pinned operator version (minVersion == maxVersion)
kind: ImageSetConfiguration
apiVersion: mirror.openshift.io/v2alpha1
mirror:
  operators:
    - catalog: quay.io/oc-mirror/oc-mirror-dev:test-catalog-latest
      packages:
      - name: foo
        defaultChannel: beta
        channels:
        - name: beta
          minVersion: '0.3.1'
          maxVersion: '0.3.1'
