kind: ImageSetConfiguration
apiVersion: mirror.openshift.io/v2alpha1
mirror:
  additionalImages:
    - name: quay.io/rh_ee_aguidi/multi-platform-container:latest
      platforms:
        - os: linux
          architecture: amd64
  platform:
    platforms:
      - os: linux
        architecture: amd64
    architectures: [arm64]
    channels:
      - name: stable-4.18
        minVersion: 4.18.1
        maxVersion: 4.18.1
