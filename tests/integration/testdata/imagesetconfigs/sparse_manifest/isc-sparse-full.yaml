kind: ImageSetConfiguration
apiVersion: mirror.openshift.io/v2alpha1
mirror:
  platform:
    graph: false
    release: quay.io/oc-mirror/release/test-release-index-multi:v0.0.1
    platforms:
      - os: linux
        architecture: amd64
      - os: linux
        architecture: arm64
  additionalImages:
    - name: quay.io/rh_ee_aguidi/multi-platform-container:latest
      platforms:
        - os: linux
          architecture: amd64
        - os: linux
          architecture: arm64
    - name: quay.io/rh_ee_aguidi/empty-image:latest
  operators:
    - catalog: quay.io/oc-mirror/oc-mirror-dev:test-catalog-latest
      packages:
        - name: foo
        - name: bar
      platforms:
        - os: linux
          architecture: amd64
  helm:
    repositories:
      - name: podinfo
        url: https://stefanprodan.github.io/podinfo
        charts:
          - name: podinfo
            version: 5.0.0
            platforms:
              - os: linux
                architecture: amd64
