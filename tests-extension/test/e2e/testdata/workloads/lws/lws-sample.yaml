kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: lws-template
objects:
- apiVersion: leaderworkerset.x-k8s.io/v1
  kind: LeaderWorkerSet
  metadata:
    name: ${NAME}
    namespace: ${NAMESPACE}
  spec:
    replicas: 4
    leaderWorkerTemplate:
      size: 3
      workerTemplate:
        spec:
          containers:
          - name: nginx
            image: ${IMAGE}
            resources:
              limits:
                cpu: "100m"
              requests:
                cpu: "50m"
            ports:
            - containerPort: 8080
parameters:
- name: NAME
- name: NAMESPACE
- name: IMAGE